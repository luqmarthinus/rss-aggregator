name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run Ruff lint
        run: ruff check .

      - name: Build Docker image
        run: docker build --no-cache -t rss-aggregator:ci .

      - name: Smoke test container (healthcheck)
        run: |
          docker run -d --name test-container -p 8000:8000 rss-aggregator:ci
          echo "Waiting for healthcheck..."
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' test-container)
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy"
              break
            fi
            sleep 2
          done
          docker inspect --format='{{.State.Health.Status}}' test-container | grep -q healthy || (docker logs test-container && exit 1)
          curl --fail http://localhost:8000/health
          docker stop test-container
          docker rm test-container