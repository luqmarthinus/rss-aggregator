name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run Ruff lint
        run: ruff check .

      - name: Build Docker image
        run: docker build --no-cache -t rss-aggregator:ci .

      - name: Smoke test container
        run: |
          docker run -d --name test-container -p 8000:8000 rss-aggregator:ci
          echo "Waiting for container to be ready..."
          # Wait up to 60 seconds for the health endpoint to respond
          for i in {1..30}; do
            if docker exec test-container python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')" 2>/dev/null; then
              echo "Health endpoint responded"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          # Final check – exit if health endpoint still not responding
          if ! docker exec test-container python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')" 2>/dev/null; then
            echo "Health endpoint did not respond within time limit"
            docker logs test-container
            exit 1
          fi
          docker logs test-container
          docker stop test-container
          docker rm test-container