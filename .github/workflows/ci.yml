name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff format --check .
      - run: ruff check .
      - run: docker build --no-cache -t rss-aggregator .

      # Smoke test using curl with retry, dummy API key
      - run: |
          docker run --rm -d --name test -p 8000:8000 -e API_KEY=ci rss-aggregator
          curl --retry 15 --retry-delay 2 --retry-connrefused http://localhost:8000/health
          docker stop test