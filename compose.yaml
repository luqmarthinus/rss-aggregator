services:
  rss-aggregator:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data      # persist SQLite
    environment:
      - DATABASE_PATH=/app/data/aggregator.db
      - API_KEY=changeme
      - REFRESH_INTERVAL_MINUTES=30
      - RATE_LIMIT_PER_MINUTE=10
    restart: unless-stopped
