<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Aggregator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="bi-rss"></i> RSS Aggregator</span>
            <div>
                <button id="refreshBtn" class="btn btn-outline-light btn-sm"><i class="bi-arrow-repeat"></i> Refresh</button>
                <button id="apiKeyBtn" class="btn btn-outline-warning btn-sm"><i class="bi-key"></i> Set API Key</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- Feeds sidebar -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        Feeds <button id="addFeedBtn" class="btn btn-sm btn-primary"><i class="bi-plus"></i> Add</button>
                    </div>
                    <div class="list-group list-group-flush" id="feedsList"></div>
                    <div class="card-footer">
                        <button id="importOpmlBtn" class="btn btn-sm btn-secondary"><i class="bi-upload"></i> Import OPML</button>
                        <button id="exportOpmlBtn" class="btn btn-sm btn-secondary"><i class="bi-download"></i> Export OPML</button>
                    </div>
                </div>
            </div>

            <!-- Articles main panel -->
            <div class="col-md-9">
                <div class="card">
                    <div class="card-header">
                        <div class="row">
                            <div class="col-md-4">
                                <input type="text" id="searchInput" class="form-control" placeholder="Search...">
                            </div>
                            <div class="col-md-3">
                                <select id="readFilter" class="form-select">
                                    <option value="all">All articles</option>
                                    <option value="unread">Unread only</option>
                                    <option value="read">Read only</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <select id="feedFilter" class="form-select">
                                    <option value="all">All feeds</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button id="searchBtn" class="btn btn-primary w-100"><i class="bi-search"></i> Search</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body" id="articlesContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add feed Modal -->
    <div class="modal fade" id="addFeedModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add RSS Feed</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="url" id="feedUrl" class="form-control" placeholder="https://example.com/rss.xml">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="confirmAddFeed" class="btn btn-primary">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
