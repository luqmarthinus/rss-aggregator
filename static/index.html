<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Feeder | Modern Aggregator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="bi-rss-fill"></i> RSS Feeder</span>
            <div>
                <button id="refreshBtn" class="btn btn-outline-light btn-sm me-2"><i class="bi-arrow-repeat"></i> Refresh</button>
                <button id="apiKeyBtn" class="btn btn-outline-warning btn-sm"><i class="bi-key"></i> API Key</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row g-4">
            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi-collection"></i> Feeds</span>
                        <button id="addFeedBtn" class="btn btn-sm btn-primary"><i class="bi-plus-lg"></i> Add</button>
                    </div>
                    <div class="list-group list-group-flush" id="feedsList"></div>
                    <div class="card-footer bg-transparent d-flex gap-2">
                        <button id="importOpmlBtn" class="btn btn-sm btn-outline-secondary w-50"><i class="bi-upload"></i> Import</button>
                        <button id="exportOpmlBtn" class="btn btn-sm btn-outline-secondary w-50"><i class="bi-download"></i> Export</button>
                    </div>
                </div>
            </div>

            <!-- Articles panel -->
            <div class="col-md-9">
                <div class="card">
                    <div class="card-header">
                        <div class="row g-2 align-items-center">
                            <div class="col-md-4">
                                <input type="text" id="searchInput" class="form-control" placeholder="Search articles...">
                            </div>
                            <div class="col-md-3">
                                <select id="readFilter" class="form-select">
                                    <option value="all">All articles</option>
                                    <option value="unread">Unread only</option>
                                    <option value="read">Read only</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <select id="feedFilter" class="form-select">
                                    <option value="all">All feeds</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button id="searchBtn" class="btn btn-primary w-100"><i class="bi-search"></i> Search</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body p-3" id="articlesContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add feed Modal -->
    <div class="modal fade" id="addFeedModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi-rss"></i> Add new feed</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="url" id="feedUrl" class="form-control" placeholder="https://example.com/feed.xml">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="confirmAddFeed" class="btn btn-primary">Add feed</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center text-muted small py-4">
        RSS Feeder — your personal reading hub.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
